<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Page Title</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/questions.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Micro+5&display=swap" rel="stylesheet"></head>
<body>
    <div class="question-app">
        <div class="question-header">
            <div class="question-header-top">
                <div class="header-home">
                    <a href="../html/start.html">
                        <img class="home-icon" src="../images/icons/home_icon.jpg" alt="Home Icon">
                    </a>
                </div>
            </div>
            <div class="question-header-shadow"></div>
        </div>
        <div class="home-main"> 
            <img class="home-main-decor" src="../images/decor/quiz_decor.png" alt="Main Decor">
            <div class="home-main-content">
                <div class="text-box-container">
                    <p class="box-text">Thank you for trusting me to translate the important words your buddy is trying to communicate. To start, I need to know more about the cat in question.</p>
                    <img class="text-box" src="../images/UI/text_box.png" alt="Text Box">
                </div>
                <div class="question-background"> 
                    <img class="quiz-background" src="../images/decor/quiz_background.png" alt="Question Image">
                </div>
                <div class="button-container">
                    <img class="primary-button" src="../images/buttons/button_a.png" alt="Start Button">
                    <h1 class="button-text">Let's Go!</h1>
                </div>
            </div>
            <img class="home-main-decor" src="../images/decor/quiz_decor.png" alt="Main Decor">
        </div>
    </div>
</body>
</html>
