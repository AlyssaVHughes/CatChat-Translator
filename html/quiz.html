<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Page Title</title>
    <script src="../javascript/quizData.js" defer></script>
    <script src="../javascript/dialogue.js" defer></script>
    <script src="../javascript/quiz.js" defer></script>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/quiz.css">
    <link rel="stylesheet" href="../css/questions.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Micro+5&display=swap" rel="stylesheet"></head>
<body>
<div class="layered-background">
    <div class="arrow-buttons">
        <div class ="button-container">
        <img id="left-arrow" class="arrow-button" src="../images/buttons/arrow_left.png" alt="Left Arrow">
        <img id="left-hover" class="arrow-hover" src="../images/buttons/left_hover.png">
        </div>
        <div class ="button-container">
        <img id="right-arrow" class="arrow-button" src="../images/buttons/arrow_right.png" alt="Right Arrow">
        <img id="right-hover" class="arrow-hover" src="../images/buttons/right_hover.png">
        </div>
    </div>
    <img class="background-layer" src="../images/decor/cloud_background.png" alt="Background Layer">
    <div class ="quiz-navigation">
        <img class="position-marker" src="../images/UI/on_position_incomplete.png" alt="Position Marker">
        <img class="position-marker" src="../images/UI/position_incomplete.png" alt="Position Marker">
        <img class="position-marker" src="../images/UI/position_incomplete.png" alt="Position Marker">
        <img class="position-marker" src="../images/UI/position_complete.png" alt="Position Marker">
        <img class="position-marker" src="../images/UI/position_incomplete.png" alt="Position Marker">
        <img class="position-marker" src="../images/UI/position_incomplete.png" alt="Position Marker">
        <img class="position-marker" src="../images/UI/position_complete.png" alt="Position Marker">
    </div>

<div class ="quiz-app">
    <div class="card-container">
        <div class="card-active">
            <div class="question-header">
                <div class="question-header-top">
                    <div class="header-home">
                        <a href="../html/start.html">
                            <img class="home-icon" src="../images/icons/home_icon.jpg" alt="Home Icon">
                        </a>
                        <div class="button-container">
                            <img class="restart-button" src="../images/buttons/button_b.png" alt="Restart Button">
                            <img class="restart-button-hover" src="../images/buttons/button_b2.png">
                            <h1 class="restart-button-text">Restart</h1>
                        </div>
                    </div>
                </div>
                <div class="question-header-shadow"></div>
            </div>
                <div class="quiz-container"> 
                        <img class="quiz-main-decor" src="../images/decor/quiz_decor.png" alt="Main Decor">
                    <div class="quiz-main">
                    <div class="quiz-header"> 
                        <img class="small_heart_2" src="../images/decor/small_heart_2.png" alt="Small Heart">
                        <h1 id= question-title class="quiz-header-text"></h1>
                        <img class="small_heart_2" src="../images/decor/small_heart_2.png" alt="Small Heart">
                    </div>
                    <div class="quiz-main-content">
                            <div class="question-background-2"> 
                                <img class="quiz-background" src="../images/decor/quiz_background_2.png" alt="Question Image">
                            </div>
                        <div class="quiz-content-container">
                            <div class="quiz-text-box-container">
                                <p id="quiz-box-text"></p>
                                <img class="quiz-text-box" src="../images/UI/quiz_text_box.png" alt="Text Box">
                            </div>
                            <div class="quiz-lower-content">
                                <img class="quiz-character" src="../images/characters/Catrina.png" alt="Quiz Cat">
                                <div class="answer-container">
                                    <div class="answer-content">
                                        <!-- <p class="answer-text">My cat's name is:</p>
                                        <input type="text" placeholder="Enter name"> -->
                                        <div id="answer-area">
                                            <!-- JavaScript inserts the question and input here -->
                                        </div>
                                        <div id="save-button" class="button-container">
                                            <img class="restart-button" src="../images/buttons/button_b.png" alt="Restart Button">
                                            <img class="restart-button-hover" src="../images/buttons/button_b2.png">
                                            <h1 class="restart-button-text">Save</h1>
                                        </div>
                                    </div>
                                    <img class="answer-box" src="../images/UI/quiz_background.png" alt="Answer Box">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <img class="quiz-main-decor" src="../images/decor/quiz_decor.png" alt="Main Decor">
            </div>
        </div>
</div>
</div>
</body>
</html>
