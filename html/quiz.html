<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Page Title</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/quiz.css">
    <link rel="stylesheet" href="../css/questions.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Micro+5&display=swap" rel="stylesheet"></head>
<body>
    <div class="card-container">
        <div class="card-active">
            <div class="question-header">
                <div class="question-header-top">
                    <div class="header-home">
                        <a href="../html/start.html">
                            <img class="home-icon" src="../images/icons/home_icon.jpg" alt="Home Icon">
                        </a>
                    </div>
                </div>
                <div class="question-header-shadow"></div>
            </div>
            <div class="quiz-main">
                <div class="quiz-header"> 
                    <img class="small_heart_2" src="../images/decor/small_heart_2.png" alt="Small Heart">
                    <h1 class="quiz-header-text">Question 1</h1>
                    <img class="small_heart_2" src="../images/decor/small_heart_2.png" alt="Small Heart">
                </div>
                <div class="quiz-main-content">
                    <div class="text-box-container">
                        <p class="box-text">What is your cat's name?</p>
                        <img class="text-box" src="../images/UI/text_box.png" alt="Text Box">
                    </div>
                    <div class="question-background"> 
                        <img class="quiz-background" src="../images/decor/quiz_background.png" alt="Question Image">
                    </div>
                </div>
                <div class="quiz-buttons">
                    <div class="button-container">
                        <img class="button" src="../images/buttons/button_e.png" alt="Start Button">
                        <img class="button-hover" src="../images/buttons/button_e2.png">
                        <h1 class="button-e-text">Back</h1>
                    </div>
                    <div class="button-container">
                        <img class="button" src="../images/buttons/button_f.png" alt="Start Button">
                        <img class="button-hover" src="../images/buttons/button_f2.png">
                        <h1 class="button-f-text">Next</h1>
                    </div>
                </div>
            </div>
        </div>
        <!-- <div class="card">
        </div>
        <div class="card">

        </div> -->
    </div>
</body>
</html>
