    <meta charset="UTF-8">
    <title>Page Title</title>
    <script src="../javascript/dialogue.js" defer></script>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/quiz.css">
    <link rel="stylesheet" href="../css/questions.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">

<body>
    <div class="card-container">
        <div class="card-active">
            <div class="question-header">
                <div class="question-header-top">
                    <div class="header-home">
                        <a href="../html/start.html">
                            <img class="home-icon" src="../images/icons/home_icon.jpg" alt="Home Icon">
                        </a>
                    </div>
                </div>
                <div class="question-header-shadow"></div>
            </div>
            <div class="quiz-main">
                <div class="quiz-header"> 
                    <img class="small_heart_2" src="../images/decor/small_heart_2.png" alt="Small Heart">
                    <h1 class="quiz-header-text">Question 1</h1>
                    <img class="small_heart_2" src="../images/decor/small_heart_2.png" alt="Small Heart">
                </div>
                <div class="quiz-main-content">
                        <div class="question-background-2"> 
                            <img class="quiz-background" src="../images/decor/quiz_background_2.png" alt="Question Image">
                        </div>
                    <div class="quiz-content-container">
                        <div class="quiz-text-box-container">
                            <p id="quiz-box-text"></p>
                            <img class="quiz-text-box" src="../images/UI/quiz_text_box.png" alt="Text Box">
                        </div>
                        <div class="quiz-lower-content">
                            <img class="quiz-character" src="../images/characters/Catrina.png" alt="Quiz Cat">
                            <div class="answer-container">
                                <div class="answer-content">
                                    <p class="answer-text">My cat's name is:</p>
                                    <input type="text" placeholder="Enter name">
                                </div>
                                <img class="answer-box" src="../images/UI/quiz_background.png" alt="Answer Box">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="quiz-buttons">
                    <div class="button-container">
                        <img class="button" src="../images/buttons/button_f.png" alt="Start Button">
                        <img class="button-hover" src="../images/buttons/button_f2.png">
                        <h1 class="button-f-text">Next</h1>
                    </div>
                </div>
            </div>
        </div>
