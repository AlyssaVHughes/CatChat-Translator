<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Page Title</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/questions.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Micro+5&display=swap" rel="stylesheet"></head>
</head>
<body>
<div class="layered-background">
    <img class="background-layer" src="../images/decor/cloud_background.png" alt="Background Layer">
    <div class="app">
        <div class="header">
            <div class="header-top">
            </div>
            <div class="header-shadow"></div>
        </div>
        <div class="home-main"> 
            <img class="home-main-decor" src="../images/decor/home_decor.png" alt="Main Decor">
            <div class="home-main-content">
                <div class="upper-images"> 
                    <div class="small-heart-container">
                        <img class="small_heart sh1" src="../images/decor/small_heart.png" alt="Small Heart">
                        <img class="small_heart sh2" src="../images/decor/small_heart_raised.png" alt="Small Heart">
                    </div>
                    <img class="angel_cat" src="../images/decor/angel_cat.png" alt="Small Heart">
                    <div class="small-heart-container">
                        <img class="small_heart sh1" src="../images/decor/small_heart.png" alt="Small Heart">
                        <img class="small_heart sh2" src="../images/decor/small_heart_raised.png" alt="Small Heart">
                    </div>
                </div>
                <div class="matt-container">
                    <img class="neutral-mat" src="../images/decor/neutral_mat.png" alt="Neutral Mat">
                    <h1 class="header-text">Cat Chat</h1>
                </div>
                <div class="lower-images"> 
                    <img class="mini_cat" src="../images/decor/mini_cat.png" alt="Mini Cat">
                    <img class="small_heart_b" src="../images/decor/small_heart.png" alt="Small Heart">
                    <img class="mini_cat" src="../images/decor/mini_cat.png" alt="Mini Cat">
                </div>
                <a href="../html/questions.html" class="start-link">
                    <div class="button-container">
                        <img class="button" src="../images/buttons/button_a.png" alt="Start Button">
                        <img class="button-hover" src="../images/buttons/button_a2.png">
                        <h1 class="button-text">Start</h1> 
                    </div>
                </a>
            </div>
            <img class="home-main-decor" src="../images/decor/home_decor.png" alt="Main Decor">
        </div>
        <img class="home-foot-decor" src="../images/decor/home_foot_decor.png" alt="Foot Decor"> 
    </div>
</div>
</body>
</html>
