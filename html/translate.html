<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Page Title</title>
    <script src="../javascript/dialogue.js" defer></script>
    <script src="../javascript/welcomeText.js" defer></script>
    <script src="../javascript/result.js" defer></script>
    <script src="../javascript/translation.js" defer></script>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/quiz.css">
    <link rel="stylesheet" href="../css/questions.css">
    <link rel="stylesheet" href="../css/translate.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/result.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Micro+5&display=swap" rel="stylesheet">
</head>
<body>
<div class="layered-background">
    <img class="background-layer" src="../images/decor/cloud_background.png" alt="Background Layer">
    <div class="question-app">
        <div class="question-header">
            <div class="question-header-top">
                <div class="header-home">
                    <a href="../html/start.html">
                        <img class="home-icon" src="../images/icons/home_icon.jpg" alt="Home Icon">
                    </a>
                </div>
            </div>
            <div class="question-header-shadow"></div>
        </div>
        <div class="home-main"> 
            <img class="home-main-decor" src="../images/decor/quiz_decor.png" alt="Main Decor">
            <div class="translate-main-content">

                <div class="translate-layers">
                    <div class="background-header">
                        <h1 id="cat-name" class="cat-name-2"></h1>
                        <h2 id="cat-personality" class="cat-personality">(Personality)</h2>
                    </div>
                    <div class="personality-background"> 
                        <img id="personality-background" class="quiz-background" src="../images/decor/sweetie_background.png" alt="Question Image">
                    </div>
                    <img id="cat-result" class="quiz-character-b" src="../images/characters/angel_light.png" alt="Quiz Cat">
                    <div id="speech-container" class="speech-container"> 

                    </div>
                </div>

                <div class="blurb-container">
                    <img class="character-icon" src="../images/characters/mini-character.png" alt="Character Icon">
                    <p id="blurb-text" class= blurb-text>What sound did your cat make?</p>
                </div>

                <div class="sound-button-container">

                        <div id="meow-button" class="button-container">
                            <img class="button" src="../images/buttons/button_f.png" alt="Meow Button">
                            <img class="button-hover" src="../images/buttons/button_f2.png">
                            <h1 class="button-text">Meow</h1>
                        </div>

                        <div id="mew-button" class="button-container">
                            <img class="button" src="../images/buttons/button_e.png" alt="Mew Button">
                            <img class="button-hover" src="../images/buttons/button_e2.png">
                            <h1 class="button-text">Mew</h1>
                        </div>

                        <div id="hiss-button" class="button-container">
                            <img class="button" src="../images/buttons/button_h.png" alt="Hiss Button">
                            <img class="button-hover" src="../images/buttons/button_h2.png">
                            <h1 class="button-text">Hiss</h1>
                        </div>

                        <div id="purr-button" class="button-container">
                            <img class="button" src="../images/buttons/button_g.png" alt="Purr Button">
                            <img class="button-hover" src="../images/buttons/button_g2.png">
                            <h1 class="button-text">Purr</h1>
                        </div>

                </div>

                <a href="../html/quiz.html" class="return-section">
                    <div id="return-arrow-container" class ="button-container">
                        <img id="return-arrow" class="return-button" src="../images/buttons/arrow_left.png" alt="Left Arrow">
                        <img id="return-hover" class="return-hover" src="../images/buttons/left_hover.png">
                    </div>

                        <h1 class="return-text">Retake Personality Quiz</h1>
                    
                </a>
                

            </div>
            <img class="home-main-decor" src="../images/decor/quiz_decor.png" alt="Main Decor">
        </div>
    </div>
</div>
</body>

</html>
